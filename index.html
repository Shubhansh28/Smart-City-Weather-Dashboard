<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <label class="lbl" for="input_place">Smart City Weather</label>
            <div class="search-box">
                <input type="text" id="input_place" placeholder="Enter your city name...">
                <button id="btn">Search</button>
            </div>
        </header>
        <div id="root" class="weather-results"></div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
